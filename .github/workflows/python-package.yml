# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          # --extra app installs gradio (moved out of core deps) so the
          # tokeye.app tests import; without it tests/test_app_load.py and the
          # `tokeye app` CLI test fail with ModuleNotFoundError: gradio.
          if [ -f pyproject.toml ]; then uv sync --dev --extra app; fi
      - name: Lint with ruff
        run: |
          uv run ruff check .
      - name: Test with pytest
        run: |
          uv run pytest

  large-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject files larger than 10 MB
        run: |
          limit=$((10 * 1024 * 1024))
          big=$(git ls-tree -r -l HEAD | awk -v lim="$limit" '$4 > lim {printf "  %.1f MB  %s\n", $4/1048576, $5}')
          if [ -n "$big" ]; then
            echo "::error::Files larger than 10 MB are not allowed (use Git LFS or external hosting):"
            echo "$big"
            exit 1
          fi
          echo "OK: no tracked file exceeds 10 MB."
