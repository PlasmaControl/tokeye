# Pre-commit hooks. Enable once per clone with:
#     uv run pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=2048]  # 2 MB; largest legit tracked file is uv.lock (< 1 MB)
  # Strip notebook outputs before commit -- rendered outputs bloated the repo
  # (scripts/usage/*.ipynb were ~1 MB each of embedded PNGs).
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
