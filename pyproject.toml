[build-system]
requires = ["uv_build"]
build-backend = "uv_build"

[project]
name = "tokeye"
version = "0.12.0"
description = "Automatic classification and localization of fluctuating signals in spectrograms"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "gradio",
    "numpy",
    "scipy",
    "matplotlib",
    "torch",
    "torchcodec",
    "torchvision",
    "torchinfo",
    "omegaconf",
    "tables",
    "pydantic",
    "huggingface-hub>=0.30",
    "tqdm",
    "pyyaml",  # tokeye.modespec.classic configs (already transitive via gradio)
]

[project.optional-dependencies]
# Mirror of the `train` dependency-group so consumers can `pip install tokeye[train]`.
# The training/ablation pipeline modules (src/tokeye/training/) import these; the
# core package and the Gradio app do not require them.
train = [
    "ipykernel",
    "ipywidgets",
    "h5py",
    "wavio",
    "joblib",
    "lightning",
    "torchaudio",
    "torchmetrics",
    "scikit-learn",
    "scikit-image",
    "pybaselines",
    "tifffile",
    "pandas",
]

[project.scripts]
tokeye = "tokeye.cli:main"

[tool.pytest.ini_options]
minversion = "9.0"
addopts = ["-ra", "-q"]
testpaths = [
    "tests",
]

[tool.uv]
package = true

[tool.uv.build-backend]
module-name = "tokeye"
module-root = "src"

[dependency-groups]
dev = [
    "ty",
    "pytest",
    "pytest-cov",
    "pytest-xdist",
    "ruff",
    "pre-commit",
]
train = [
    "ipykernel",
    "ipywidgets",

    "h5py",
    "wavio",
    "joblib",

    "lightning",
    "torchaudio",
    "torchmetrics",

    "scikit-learn",
    "scikit-image",

    "pybaselines",
    "tifffile",
    "pandas",
]
